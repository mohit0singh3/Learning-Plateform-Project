spring:
  application:
    name: codesphere-backend

  sql:
    init:
      mode: never
      schema-locations: classpath:schema-h2.sql

  datasource:
    url: jdbc:h2:mem:codesphere_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: your-secret-key-change-this-in-production-min-256-bits
  expiration: 86400000

logging:
  level:
    com.cursorai: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
