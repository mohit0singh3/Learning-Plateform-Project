version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cursor-ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cursor_ai_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/migration/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - cursor-ai-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cursor-ai-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cursor_ai_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
    depends_on:
      - mysql
    networks:
      - codesphere-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codesphere-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - codesphere-network

networks:
  codesphere-network:
    driver: bridge

volumes:
  mysql_data:
